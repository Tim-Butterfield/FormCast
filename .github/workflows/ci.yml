name: CI

# Continuous integration for development workflow.
#
# Fires on push/PR to main. Builds the solution in Release, runs the
# full xUnit test suite, and uploads test results plus plugin binaries
# as per-commit artifacts for download or inspection.
#
# Release packaging lives in release.yml and fires on v* tags.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FormCast.sln

      - name: Build
        run: dotnet build FormCast.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/FormCast.Tests/FormCast.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/FormCast.Tests/TestResults/*.trx

      - name: Upload plugin binaries
        uses: actions/upload-artifact@v4
        with:
          name: FormCast-${{ github.sha }}
          path: |
            src/FormCast/bin/Release/net48/*.dll
            src/FormCast/bin/Release/net48/*.xml
            src/FormCast.Host/bin/Release/net48/FormCast.Host.exe
            src/FormCast.Host/bin/Release/net48/FormCast.Host.exe.config
